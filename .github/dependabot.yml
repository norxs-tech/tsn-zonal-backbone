# Dependabot — known-vulnerability & freshness monitoring for CI toolchain
# Part of the OpenChain ISO/IEC 18974 security assurance program
# (docs/compliance/openchain-iso18974.md §3.1.1).
#
# The production library has zero third-party runtime dependencies, so the
# monitored surface is the GitHub Actions used by the CI pipeline.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "security-assurance"
    commit-message:
      prefix: "ci(deps)"
